<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Cumpleaños</title>

  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      font-family: Arial, sans-serif;
      color: white;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }

    h1 {
      font-size: 2.2em;
      margin-top: 40px;
    }

    p {
      font-size: 1.1em;
      padding: 0 15px;
      max-width: 500px;
      margin: 10px auto;
    }

    button {
      padding: 14px 25px;
      border-radius: 12px;
      background: #ff6f61;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1em;
      margin-top: 15px;
    }

    button:active {
      transform: scale(0.95);
    }

    /* Globos */
    .globo {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 60px;
      border-radius: 50%;
      animation: subir 6s linear infinite;
    }

    @keyframes subir {
      to { transform: translateY(-110vh); }
    }

    /* Frases */
    .frase {
      position: absolute;
      animation: flotar 5s linear infinite;
      font-weight: bold;
    }

    @keyframes flotar {
      to { transform: translateY(-110vh); opacity: 0; }
    }

    /* Responsive extra para pantallas pequeñas */
    @media (max-width: 480px) {
      h1 { font-size: 1.8em; }
      p { font-size: 1em; }
      button { font-size: 0.9em; padding: 12px 20px; }
    }
  </style>
</head>

<body>

<h1>🎉 ¡Feliz Cumpleaños! 🎂</h1>
<p id="mensaje">Feliz cumpleaños Clever 😁</p>

<button id="btn">Ver mensaje</button>

<script>
document.getElementById("btn").onclick = function() {

  document.getElementById("mensaje").innerHTML =
    "🎉 Feliz cumpleaños Clever 🔥 ya 18 años 😎 todo un adulto... pásala increíble, no te rindas en la universidad 💪 tienes todo mi apoyo... y vota bien ps 😂";

  // 🎈 Globos
  for (var i = 0; i < 12; i++) {
    var globo = document.createElement("div");
    globo.className = "globo";
    globo.style.left = Math.random() * window.innerWidth + "px";
    globo.style.background = "hsl(" + (Math.random()*360) + ",70%,60%)";
    document.body.appendChild(globo);
  }

  // 😎 Frases flotando
  var frases = ["CRACK 😎","LEYENDA 🔥","MAQUINA 💪","FELIZ CUMPLE 🎉","TOP 🔝"];

  setInterval(function() {
    var texto = document.createElement("div");
    texto.className = "frase";
    texto.innerHTML = frases[Math.floor(Math.random() * frases.length)];

    texto.style.left = Math.random() * window.innerWidth + "px";
    texto.style.bottom = "0px";
    texto.style.fontSize = (16 + Math.random() * 20) + "px";
    texto.style.color = "hsl(" + (Math.random()*360) + ",70%,60%)";

    document.body.appendChild(texto);

    setTimeout(function() {
      texto.remove();
    }, 5000);

  }, 600);

};
</script>

</body>
</html>
